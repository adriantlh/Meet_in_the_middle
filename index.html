<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geographic Center Finder</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="control-panel">
        <h1>Geographic Center Finder</h1>
        
        <div class="input-section">
            <input type="text" id="address-input" placeholder="Enter an address (e.g., New York, NY)">
            <button id="add-location-btn">Add Location</button>
        </div>

        <div class="list-section">
            <h3>Locations:</h3>
            <ul id="locations-list"></ul>
        </div>

        <div class="search-section">
            <h3>Find Point of Interest</h3>
            <div class="search-controls">
                <select id="poi-type">
                    <option value="restaurant">Restaurant</option>
                    <option value="tourist_attraction">Tourist Attraction</option>
                    <option value="gas_station">Gas Station</option>
                    <option value="park">Park</option>
                </select>
                <label for="search-radius">Radius (km):</label>
                <input type="number" id="search-radius" value="1" min="1" max="500">
            </div>
            <button id="search-poi-btn">Search Near Center</button>
        </div>

        <div id="center-coords">Add at least two locations to calculate the center.</div>
        <div id="status-message" class="hidden"></div>
    </div>

    <div id="map"></div>

        <!-- POI Details Panel -->
    <div id="poi-details-panel" class="hidden">
        <div id="poi-list-container">
            <h4>Found Locations</h4>
            <ul id="poi-list"></ul>
        </div>
     <!-- REPLACE the existing #poi-info-container with this -->

<div id="poi-info-container">
    <h4 id="poi-info-name">Select a location</h4>
    <div id="poi-info-content">
        <!-- This content will be dynamically generated -->
    </div>
    <!-- NEW: Action Buttons Container -->
    <div id="poi-actions" class="hidden">
        <button id="directions-btn">Get Directions</button>
        <button id="streetview-btn">View on Street View</button>
    </div>
</div>
    </div>

    <!-- 
        IMPORTANT: Replace YOUR_API_KEY with your actual Google Maps API key.
        The 'marker' library is required for the new AdvancedMarkerElement.
    -->
    <script async defer
        src="https://maps.googleapis.com/maps/api/js?key=_API_KEY_HERE_&libraries=places,marker&callback=initMap">
    </script>
    <script src="js/app.js"></script>
</body>
</html>
