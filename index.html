<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MeetWay</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <script>
        // Apply theme immediately to prevent flicker
        if (localStorage.getItem('meetway_theme') === 'dark') {
            document.body.classList.add('dark-mode');
        }
    </script>
    <header class="app-header">
        <div class="header-content">
            <div class="logo">
                <span class="logo-icon">📍</span>
                <span class="logo-text">MeetWay</span>
            </div>
            <div class="header-actions">
                <nav class="header-nav">
                    <a href="#" onclick="showHowItWorks()">How it works</a>
                </nav>
                <button id="theme-toggle" class="theme-toggle" title="Toggle Theme">🌓</button>
            </div>
        </div>
    </header>

    <div class="control-panel">
        <h1>MeetWay</h1>
        
        <div class="card-section">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
                <h3 style="margin: 0;">Participants</h3>
                <div style="display: flex; align-items: center; gap: 8px;">
                    <span style="font-size: 11px; color: var(--text-sub);">Travel Mode:</span>
                    <select id="travel-mode" style="padding: 4px 8px; width: auto; font-size: 11px;">
                        <option value="DRIVING">🚗 Driving</option>
                        <option value="WALKING">🚶 Walking</option>
                        <option value="BICYCLING">🚲 Biking</option>
                        <option value="TRANSIT">🚆 Transit</option>
                    </select>
                </div>
            </div>
            <div class="input-group">
                <input type="text" id="address-input" placeholder="Enter an address..." style="flex: 1; min-width: 0;">
                <button id="current-location-btn" class="icon-btn" title="Use my current location">🎯</button>
                <button id="add-location-btn">Add</button>
            </div>
            <ul id="locations-list"></ul>
        </div>

        <div class="card-section">
            <h3>Find Point of Interest</h3>
            <div class="input-group">
                <select id="poi-type">
                    <option value="restaurant">🍴 Restaurant</option>
                    <option value="cafe">☕ Cafe</option>
                    <option value="bar">🍺 Bar</option>
                    <option value="park">🌳 Park</option>
                    <option value="tourist_attraction">🎡 Attraction</option>
                    <option value="library">📚 Library</option>
                    <option value="gym">💪 Gym</option>
                    <option value="movie_theater">🎬 Cinema</option>
                    <option value="custom">🔍 Custom Search...</option>
                </select>
                <input type="number" id="search-radius" value="1" min="1" max="50" style="width: 80px;">
                <span style="font-size: 12px; color: var(--text-sub); align-self: center;">km</span>
            </div>
            <div id="custom-poi-container" class="hidden" style="margin-bottom: 12px;">
                <input type="text" id="custom-poi-query" placeholder="What are you looking for? (e.g. Sushi, Pizza)">
            </div>
            <button id="search-poi-btn" style="width: 100%;">Search Near Center</button>
        </div>

        <div class="card-section" style="background: white;">
            <div id="center-coords" style="font-size: 13px; color: var(--text-sub);">Add 2+ locations to start.</div>
            <div id="fairness-score" class="hidden"></div>
        </div>

        <button id="share-btn">Share Meetup Plan</button>
        <div id="status-message" class="hidden"></div>

        <footer class="sidebar-footer">
            <p>&copy; 2026 MeetWay. Built with Google Maps Platform.</p>
            <div class="footer-links">
                <a href="#">Privacy</a> • <a href="#">Terms</a>
            </div>
        </footer>
    </div>

    <div id="map"></div>

    <!-- Right-side POI Drawer -->
    <div id="poi-details-panel">
        <div id="poi-list-container">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2 style="margin: 0; font-size: 18px;">Found Locations</h2>
                <button class="remove-btn desktop-only" onclick="document.getElementById('poi-details-panel').classList.remove('visible')" title="Close">✕</button>
                <button class="secondary mobile-only" style="display: none; padding: 6px 12px; font-size: 12px;" onclick="document.getElementById('poi-details-panel').classList.remove('visible')">Back to Map</button>
            </div>
            <div id="poi-list"></div>
        </div>

        <!-- Detail View (Layered inside drawer) -->
        <div id="poi-info-view">
            <div class="drawer-header">
                <button class="back-btn" onclick="document.getElementById('poi-info-view').classList.remove('open')" title="Back">←</button>
                <h4 id="poi-info-name" style="margin: 0; font-size: 16px;">Details</h4>
            </div>
            <div class="drawer-content">
                <div id="poi-info-content"></div>
                <div id="poi-actions" style="display: flex; gap: 10px; margin-top: 24px;">
                    <button id="directions-btn" style="flex: 1;">Directions</button>
                    <button id="streetview-btn" class="secondary" style="flex: 1;">Street View</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
